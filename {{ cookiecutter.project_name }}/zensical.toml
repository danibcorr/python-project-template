[project]
site_name = "{{ cookiecutter.site_name }}"
site_description = "{{ cookiecutter.project_short_description }}"
site_url = "{{ cookiecutter.site_url }}"
repo_url = "{{ cookiecutter.repo_url }}"
repo_name = "{{ cookiecutter.project_name }}"
nav = [
    {"Home" = "index.md"},
    {"Documentation" = [
        {"Config" = "project/config/config.md"},
        {"ETL" = "project/etl/etl.md"},
        {"Models" = "project/models/models.md"},
        {"Utils" = "project/utils/utils.md"},
    ]},
]
extra_css = ["assets/css/custom.css"]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.indexes",
    "navigation.path",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "navigation.sections",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "black"
toggle.icon = "material/weather-night"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "black"
accent = "black"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to dark mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra.status]
new = "Recently added"
deprecated = "Deprecated"

[project.extra.version]
provider = "mike"
default = "latest"

[project.plugins.mkdocstrings.handlers.python]
paths = ["{{ cookiecutter.project_module_name }}"]
inventories = ["https://docs.python.org/3/objects.inv"]

[project.plugins.mkdocstrings.handlers.python.options]
summary = false
merge_init_into_class = true
docstring_style = "google"
show_root_heading = true
show_source = true
show_bases = false
show_root_full_path = false
show_symbol_type_heading = true
show_symbol_type_toc = true
modernize_annotations = true
show_submodules = false
filters = ["!get_config", "!build", "!^_[^_]"]

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = true

[project.markdown_extensions.tables]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.abbr]

[project.markdown_extensions.toc]
toc_depth = 2

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
