[project]
site_name = "Python project template"
site_description = "Python project template"
site_url = "https://danibcorr.github.io/python-project-template"
repo_url = "https://github.com/danibcorr/python-project-template"
repo_name = "python-project-template"
nav = [
    {"Home" = "index.md"},
    {"Documentation" = [
        {"Overview" = "content/overview.md"},
        {"Getting Started" = "content/cookiecutter.md"},
        {"Makefile Commands" = "content/makefile-commands.md"},
        {"Configuration" = "content/pyproject-configuration.md"},
        {"Pre-commit Hooks" = "content/pre-commit-hooks.md"},
        {"CI/CD" = "content/ci-cd.md"},
    ]},
]
extra_css = ["assets/css/custom.css"]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

[project.theme]
language = "en"
logo = "assets/images/logo.png"
favicon = "assets/images/logo.png"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.indexes",
    "navigation.path",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "navigation.sections",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "black"
toggle.icon = "material/weather-night"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "black"
accent = "black"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to dark mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra.status]
new = "Recently added"
deprecated = "Deprecated"

[project.extra.version]
provider = "mike"
default = "latest"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/danibcorr/"

[project.markdown_extensions.tables]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.abbr]

[project.markdown_extensions.toc]
toc_depth = 2

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
